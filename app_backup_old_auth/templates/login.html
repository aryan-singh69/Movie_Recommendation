{% extends "base.html" %}

{% block content %}
<div class="auth-box">
    <h2 style="text-align: center; margin-bottom: 30px; font-size: 1.8rem; color: #fff;">Welcome Back</h2>
    
    {% if error %}
    <div class="error-msg">Invalid credentials. Please verify your username and password.</div>
    {% endif %}
    
    <form action="/login" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Log In</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; color: #888;">Don't have an account? <a href="/signup" style="color: var(--primary);">Sign up</a></p>
</div>
{% endblock %}
