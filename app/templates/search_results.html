{% extends "base.html" %}

{% block content %}
<h3 class="section-title">Search Results for "{{ query }}"</h3>

{% if error %}
<div class="error-msg" style="margin-bottom: 20px;">
    <strong>Error:</strong> {{ error }}
</div>
{% endif %}

{% if movies %}
<div class="movie-grid">
    {% for movie in movies %}
    <div class="movie-card">
        <h3><a href="/movie/{{ movie.title | urlencode }}">{{ movie.title }}</a></h3>
        <p class="genre">{{ movie.genres }}</p>
    </div>
    {% endfor %}
</div>
{% else %}
<p style="text-align: center; font-size: 1.2rem; margin-top: 40px; color: #7f8c8d;">No movies found.</p>
{% endif %}
{% endblock %}
