{% extends "base.html" %}

{% block title %}Login - MovieRec{% endblock %}
{% block page_id %}login{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <a href="/" class="auth-brand">MovieRec</a>
        <h1>Sign in</h1>
        <p>Welcome back. Your recommendations are waiting.</p>

        <form id="loginForm" class="auth-form" novalidate>
            <label>
                Email or username
                <input type="text" name="identifier" placeholder="you@example.com" autocomplete="username" required>
            </label>
            <label>
                Password
                <input type="password" name="password" placeholder="Your password" autocomplete="current-password" required>
            </label>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-switch">New to MovieRec? <a href="/signup">Create an account</a></p>
    </div>
</section>
{% endblock %}
