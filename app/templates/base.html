<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MovieRec{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/app.js"></script>
</head>
<body>
    <nav id="mainNav">
        <a href="/home" class="logo">MOVIEREC</a>
        <div class="search-bar">
            <input type="text" placeholder="Titles, genres..." onkeyup="if(event.key === 'Enter') performSearch(this.value)">
        </div>
        <div class="user-menu">
            <span class="username-display"></span>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        // Global auth check except on public pages
        if (!['/login', '/signup', '/'].includes(window.location.pathname)) {
            checkAuth();
        }
    </script>
</body>
</html>
