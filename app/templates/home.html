{% extends "base.html" %}

{% block title %}Home - MovieRec{% endblock %}

{% block content %}
<div id="hero" class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1 id="heroTitle" class="hero-title">Featured Movie</h1>
        <p id="heroDesc" class="hero-desc"></p>
        <div class="hero-buttons">
            <button class="btn btn-primary">▶ Play</button>
            <button id="heroInfoBtn" class="btn btn-secondary">ⓘ More Info</button>
        </div>
    </div>
</div>

<div id="searchSection" class="movie-row" style="display:none;">
    <h2 class="row-title">Search Results</h2>
    <div id="searchResults" class="row-container"></div>
</div>

<div class="movie-row">
    <h2 class="row-title">Recommended For You</h2>
    <div id="recommendedRow" class="row-container"></div>
</div>

<div class="movie-row">
    <h2 class="row-title">Popular on MovieRec</h2>
    <div id="popularRow" class="row-container"></div>
</div>

<div class="movie-row">
    <h2 class="row-title">Top Rated</h2>
    <div id="topRatedRow" class="row-container"></div>
</div>

<script>
    async function loadHome() {
        const userId = localStorage.getItem('user_id');
        
        // Load Recommendations
        const recData = await fetchMovies(`/api/recommend/${userId}`);
        renderMovieRow('recommendedRow', recData.recommendations);
        
        // Setup Hero from first recommendation
        if (recData.recommendations.length > 0) {
            const featured = recData.recommendations[0];
            document.getElementById('heroTitle').textContent = featured.title;
            document.getElementById('heroDesc').textContent = featured.genres;
            if (featured.poster_path) {
                document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${featured.poster_path})`;
            }
            document.getElementById('heroInfoBtn').onclick = () => window.location.href = `/movie/${featured.movieId}`;
        }

        // Load Popular
        const popData = await fetchMovies('/api/popular');
        renderMovieRow('popularRow', popData.recommendations);

        // Load Top Rated
        const topData = await fetchMovies('/api/top-rated');
        renderMovieRow('topRatedRow', topData.recommendations);
    }

    // Override performSearch to show search section
    const originalSearch = performSearch;
    window.performSearch = async (query) => {
        document.getElementById('searchSection').style.display = query ? 'block' : 'none';
        await originalSearch(query);
    };

    window.onload = loadHome;
</script>
{% endblock %}
