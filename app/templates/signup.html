{% extends "base.html" %}

{% block title %}Sign Up - MovieRec{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Sign Up</h1>
        <form onsubmit="event.preventDefault(); signup(this.username.value, this.email.value, this.password.value)">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required minlength="3">
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">Get Started</button>
        </form>
        <p>Already have an account? <a href="/login">Sign in.</a></p>
    </div>
</div>

<style>
    #mainNav { display: none; }
</style>
{% endblock %}
