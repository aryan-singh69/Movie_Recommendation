{% extends "base.html" %}

{% block title %}Sign Up - MovieRec{% endblock %}
{% block page_id %}signup{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <a href="/" class="auth-brand">MovieRec</a>
        <h1>Create account</h1>
        <p>Build a profile and unlock personalized recommendations.</p>

        <form id="signupForm" class="auth-form" novalidate>
            <label>
                Username
                <input type="text" name="username" placeholder="moviefan" autocomplete="username" minlength="3" required>
            </label>
            <label>
                Email
                <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
            </label>
            <label>
                Password
                <input type="password" name="password" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" maxlength="72" required>
            </label>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</section>
{% endblock %}
