{% extends "base.html" %}

{% block content %}
<div class="auth-box">
    <h2 style="text-align: center; margin-bottom: 30px; font-size: 1.8rem; color: #fff;">Create Account</h2>
    
    {% if error %}
    <div class="error-msg">Username or Email already exists.</div>
    {% endif %}
    
    <form action="/signup" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn" style="width: 100%; background-color: #3b82f6;">Sign Up</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; color: #888;">Already have an account? <a href="/login" style="color: var(--primary);">Log in</a></p>
</div>
{% endblock %}
